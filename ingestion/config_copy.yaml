# Configuration de l'ingestion Méthode 2 (stage interne + COPY INTO).
# Fichier propre à load_copy.py — distinct du config.yaml partagé (Méthode 1).

snowflake:
  warehouse: NYC_TAXI_WH
  database: NYC_TAXI_DB
  schema: RAW

ingestion:
  # Source officielle NYC TLC (https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page)
  base_url: https://d37ci6vzurychx.cloudfront.net/trip-data
  table_name: YELLOW_TAXI_TRIPS
  stage: NYC_STAGE
  file_format: ff_parquet
  timeout: 300
  fichiers:
    - yellow_tripdata_2024-01.parquet
    - yellow_tripdata_2024-02.parquet
    - yellow_tripdata_2024-03.parquet
    - yellow_tripdata_2024-04.parquet
    - yellow_tripdata_2024-05.parquet
    - yellow_tripdata_2024-06.parquet
    - yellow_tripdata_2024-07.parquet
    - yellow_tripdata_2024-08.parquet
    - yellow_tripdata_2024-09.parquet
    - yellow_tripdata_2024-10.parquet
    - yellow_tripdata_2024-11.parquet
    - yellow_tripdata_2024-12.parquet
    - yellow_tripdata_2025-01.parquet
    - yellow_tripdata_2025-02.parquet
