name: NYC Taxi Pipeline CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8 sqlfluff

      - name: Lint Python
        run: flake8 ingestion/ --max-line-length=120

      - name: Lint SQL
        run: sqlfluff lint sql/ --dialect snowflake
        continue-on-error: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}.0.0
          name: Release v${{ github.run_number }}.0.0
          generate_release_notes: true