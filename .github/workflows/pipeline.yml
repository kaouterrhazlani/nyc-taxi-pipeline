  #       working-directory: dbt/nyc_taxi
  #       run: dbt run

  #     # Exécute les 66 tests qualité DBT (not_null, accepted_values, max/min)
  #     - name: DBT test
  #       working-directory: dbt/nyc_taxi
  #       run: dbt test

  # ─── JOB 3 : RELEASE ─────────────────────────────────────────────────────────
  # Crée une release GitHub automatiquement sur chaque push vers main
  # Dépend du job lint (needs: [lint])
  # Ne s'exécute que sur main et uniquement sur un push (pas sur PR)
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write  # nécessaire pour créer une release
    steps:
      - uses: actions/checkout@v3

      # Crée une release avec le numéro de run comme version
      # Ex: v42.0.0 pour le 42ème run du workflow
      # generate_release_notes: true → génère automatiquement les notes depuis les commits
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}.0.0
          name: Release v${{ github.run_number }}.0.0
          generate_release_notes: true