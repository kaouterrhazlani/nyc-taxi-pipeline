name: NYC Taxi Pipeline CI/CD

# Déclencheurs du workflow
on:
  # Déclenché sur chaque push vers main ou dev
  push:
    branches:
      - main
      - dev
  # Déclenché sur chaque Pull Request vers main ou dev
  pull_request:
    branches:
      - main
      - dev
  # Décommentez pour activer le déclenchement automatique quotidien à 6h UTC
  # schedule:
  #   - cron: '0 6 * * *'  # tous les jours à 6h UTC
  # Décommentez pour activer le déclenchement manuel depuis l'onglet Actions
  # workflow_dispatch:

jobs:
  # ─── JOB 1 : LINT ────────────────────────────────────────────────────────────
  # Vérifie la qualité du code Python (flake8) et SQL (sqlfluff)
  # continue-on-error: true → un échec de lint ne bloque pas la Release
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      # Récupère le code du repo sur le runner
      - uses: actions/checkout@v3

      # Installe Python 3.11 sur le runner
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Installe les outils de lint
      - name: Install dependencies
        run: pip install flake8 sqlfluff

      # Vérifie la syntaxe et le style Python
      # Limite les lignes à 120 caractères
      - name: Lint Python
        run: flake8 ingestion/ --max-line-length=120

      # Vérifie la syntaxe SQL pour Snowflake
      # continue-on-error: true → les erreurs SQL n'arrêtent pas le job
      - name: Lint SQL
        run: sqlfluff lint sql/ --dialect snowflake
        continue-on-error: true

  # ─── JOB 2 : DBT (désactivé) ─────────────────────────────────────────────────
  # Désactivé car :
  #   - Quota de minutes runner limité dans l'organisation Simplon
  #   - Chaque collaborateur a son propre compte trial Snowflake
  #     → le secret SNOWFLAKE_PRIVATE_KEY_B64 pointe vers un seul compte
  #     → le check DBT échouerait pour les autres collaborateurs
  # À réactiver quand un compte Snowflake partagé sera disponible
