  #   name: DBT
  #   runs-on: ubuntu-latest
  #   needs: lint
  #   env:
  #     SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  #     SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  #     SNOWFLAKE_KEY_PATH: /home/runner/.ssh/snowflake_key.p8
  #     DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/nyc_taxi
  #   steps:
  #     - uses: actions/checkout@v3

  #     - name: Setup Python
  #       uses: actions/setup-python@v4
  #       with:
  #         python-version: '3.11'

  #     - name: Install DBT
  #       run: pip install dbt-snowflake

  #     # Décode la clé privée RSA depuis le secret GitHub (encodé en base64)
  #     # et la sauvegarde dans ~/.ssh/snowflake_key.p8
