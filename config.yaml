snowflake:
  warehouse: NYC_TAXI_WH
  database: NYC_TAXI_DB
  schema: RAW

ingestion:
  base_url: https://d37ci6vzurychx.cloudfront.net/trip-data
  table_name: YELLOW_TAXI_TRIPS
  timeout: 300
  technical_columns:
    - _source_file
    - _ingestion_date
  annees:
    - 2024
    - 2025
    - 2026
  truncate_before_ingestion: true  # attention : supprime toutes les données existantes avant ingestion

taxi_zones:
  url: "https://d37ci6vzurychx.cloudfront.net/misc/taxi_zone_lookup.csv"
  target_schema: "RAW"
  target_table: "TAXI_ZONES"
  overwrite: true

auth:
  method: "keypair"
  private_key_path: "~/.ssh/snowflake_key.p8"
